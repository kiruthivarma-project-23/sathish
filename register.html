<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SQAIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode auth-page">
    <div class="stars"></div>
    
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100">
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center">
                <div class="auth-illustration">
                    <div class="animated-shape shape-1"></div>
                    <div class="animated-shape shape-2"></div>
                    <div class="auth-icon">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2 class="gradient-text mt-4">Join Us Today</h2>
                    <p class="text-light">Create an account and start managing your questions intelligently</p>
                </div>
            </div>
            <div class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="auth-form-container">
                    <div class="text-center mb-5">
                        <a href="index.html" class="d-inline-block mb-3">
                            <i class="fas fa-brain fa-2x gradient-text"></i>
                        </a>
                        <h1 class="fw-bold mb-2">Create Account</h1>
                        <p class="text-light">Register to get started</p>
                    </div>

                    <form id="registerForm" class="glassmorphic p-4">
                        <div class="mb-4">
                            <label for="fullname" class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="text" class="form-control" id="fullname" name="fullname" 
                                       placeholder="John Doe" required>
                            </div>
                            <div class="invalid-feedback d-block" id="fullnameError"></div>
                        </div>

                        <div class="mb-4">
                            <label for="regEmail" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="regEmail" name="email" 
                                       placeholder="your@email.com" required>
                            </div>
                            <div class="invalid-feedback d-block" id="regEmailError"></div>
                        </div>

                        <div class="mb-4">
                            <label for="regPassword" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="regPassword" name="password" 
                                       placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggleRegPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback d-block" id="regPasswordError"></div>
                            <small class="text-light">
                                <i class="fas fa-info-circle"></i> At least 8 characters with uppercase, lowercase, and numbers
                            </small>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                                       placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback d-block" id="confirmPasswordError"></div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" name="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the Terms of Service and Privacy Policy
                            </label>
                            <div class="invalid-feedback d-block" id="agreeTermsError"></div>
                        </div>

                        <button type="submit" class="btn btn-primary-glass w-100 py-2 fw-bold mb-3">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>

                        <div id="registerAlert"></div>

                        <hr class="my-4">

                        <p class="text-center mb-0">
                            Already have an account? 
                            <a href="login.html" class="text-primary-glass fw-bold">Sign in here</a>
                        </p>
                    </form>

                    <div class="text-center mt-4">
                        <a href="index.html" class="text-muted">
                            <i class="fas fa-home"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Animation -->
    <div id="loadingSpinner" class="loading-overlay d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
