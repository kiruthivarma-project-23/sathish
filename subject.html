<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Prediction - SQAIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode">
    <div class="stars"></div>

    <div class="layout-wrapper">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar glassmorphic">
            <div class="sidebar-header">
                <a href="dashboard.html" class="brand">
                    <i class="fas fa-brain"></i>
                    <span>SQAIP</span>
                </a>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="nav flex-column">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="questions.html" class="nav-link">
                    <i class="fas fa-question-circle"></i>
                    <span>Questions</span>
                </a>
                <a href="similarity.html" class="nav-link">
                    <i class="fas fa-search"></i>
                    <span>Similarity Finder</span>
                </a>
                <a href="autotag.html" class="nav-link">
                    <i class="fas fa-tags"></i>
                    <span>Auto Tagging</span>
                </a>
                <a href="graph.html" class="nav-link">
                    <i class="fas fa-network-wired"></i>
                    <span>Knowledge Graph</span>
                </a>
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-pie"></i>
                    <span>Analytics</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user-circle"></i>
                    <span>Profile</span>
                </a>
                <hr class="my-3">
                <a href="#" class="nav-link" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <button id="themeToggleSidebar" class="btn btn-sm btn-theme-toggle w-100">
                        <i class="fas fa-moon"></i> Dark Mode
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="topbar glassmorphic">
                <button class="btn btn-sm" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="topbar-search">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control" placeholder="Search...">
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-icon">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <div class="user-menu">
                        <button class="btn btn-icon dropdown-toggle" id="userMenuBtn">
                            <i class="fas fa-user-circle"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end" id="userDropdown">
                            <a class="dropdown-item" href="profile.html">
                                <i class="fas fa-user"></i> Profile
                            </a>
                            <a class="dropdown-item" href="#">
                                <i class="fas fa-cog"></i> Settings
                            </a>
                            <hr class="dropdown-divider">
                            <a class="dropdown-item" href="#" id="logoutLink">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Page Content -->
            <div class="page-content p-4">
                <!-- Page Header -->
                <div class="page-header mb-5">
                    <div>
                        <h1 class="page-title">Subject Prediction</h1>
                        <p class="page-subtitle">Automatically classify questions into subjects</p>
                    </div>
                </div>

                <!-- Input Section -->
                <div class="glassmorphic p-4 mb-4">
                    <h5 class="mb-4">Select Questions for Subject Classification</h5>
                    <form id="subjectForm">
                        <div class="mb-4">
                            <label class="form-label">Questions</label>
                            <div id="questionsList"></div>
                        </div>
                        <button type="submit" class="btn btn-primary-glass">
                            <i class="fas fa-brain"></i> Predict Subject
                        </button>
                    </form>
                </div>

                <!-- Results Section -->
                <div id="resultsSection" style="display: none;">
                    <div class="glassmorphic p-4">
                        <h5 class="mb-4">
                            <i class="fas fa-check-circle"></i> Subject Predictions
                        </h5>

                        <div id="subjectResults"></div>

                        <div class="mt-4">
                            <button class="btn btn-success-glass" id="applySuggestionsBtn">
                                <i class="fas fa-check"></i> Apply Predictions
                            </button>
                            <button class="btn btn-secondary-glass" id="rejectSuggestionsBtn">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toastNotification" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Your message here
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
