<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SQAIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-mode auth-page">
    <div class="stars"></div>
    
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100">
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center">
                <div class="auth-illustration">
                    <div class="animated-shape shape-1"></div>
                    <div class="animated-shape shape-2"></div>
                    <div class="auth-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <h2 class="gradient-text mt-4">Welcome Back</h2>
                    <p class="text-light">Sign in to access your smart question management platform</p>
                </div>
            </div>
            <div class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="auth-form-container">
                    <div class="text-center mb-5">
                        <a href="index.html" class="d-inline-block mb-3">
                            <i class="fas fa-brain fa-2x gradient-text"></i>
                        </a>
                        <h1 class="fw-bold mb-2">Sign In</h1>
                        <p class="text-light">Enter your credentials to continue</p>
                    </div>

                    <form id="loginForm" class="glassmorphic p-4">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-envelope"></i>
                                </span>
                                <input type="email" class="form-control" id="email" name="email" 
                                       placeholder="your@email.com" required>
                            </div>
                            <div class="invalid-feedback d-block" id="emailError"></div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-lock"></i>
                                </span>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback d-block" id="passwordError"></div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary-glass w-100 py-2 fw-bold mb-3">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>

                        <div id="loginAlert"></div>

                        <hr class="my-4">

                        <p class="text-center mb-0">
                            Don't have an account? 
                            <a href="register.html" class="text-primary-glass fw-bold">Sign up here</a>
                        </p>
                    </form>

                    <div class="text-center mt-4">
                        <a href="index.html" class="text-muted">
                            <i class="fas fa-home"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Animation -->
    <div id="loadingSpinner" class="loading-overlay d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
